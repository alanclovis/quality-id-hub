<!DOCTYPE html>
<html>
<head>
  <base target="_top">
  <meta charset="UTF-8">
  <style>body{font-family:sans-serif;font-size:12px;color:#666;margin:8px}</style>
</head>
<body>
<p id="status">Ponte Dimensionamento — aguardando Hub…</p>
<script>
(function () {
  var ALLOWED_ORIGINS = [
    'https://alanclovis.github.io',
    'http://localhost:5500',
    'http://127.0.0.1:5500',
    'http://localhost:8080',
    'http://127.0.0.1:8080'
  ];

  function isAllowedOrigin(origin) {
    if (!origin || origin === 'null') return true;
    for (var i = 0; i < ALLOWED_ORIGINS.length; i++) {
      if (origin.indexOf(ALLOWED_ORIGINS[i]) === 0) return true;
    }
    if (origin.indexOf('http://localhost') === 0) return true;
    if (origin.indexOf('http://127.0.0.1') === 0) return true;
    return false;
  }

  var pending = {};

  window.addEventListener('message', function (ev) {
    if (!isAllowedOrigin(ev.origin)) return;
    var msg = ev.data;
    if (!msg || msg.source !== 'quality-id-hub' || !msg.id || !msg.action) return;

    google.script.run
      .withSuccessHandler(function (json) {
        try {
          var res = JSON.parse(json);
          ev.source.postMessage({ source: 'dim-bridge', id: msg.id, ok: res.ok, data: res.data, error: res.error, validationRejected: res.validationRejected }, ev.origin);
        } catch (e) {
          ev.source.postMessage({ source: 'dim-bridge', id: msg.id, ok: false, error: String(e) }, ev.origin);
        }
      })
      .withFailureHandler(function (err) {
        ev.source.postMessage({ source: 'dim-bridge', id: msg.id, ok: false, error: String(err.message || err) }, ev.origin);
      })
      .dimApiCall(msg.action, JSON.stringify(msg.payload || {}));
  });

  function notifyReady() {
    if (window.parent && window.parent !== window) {
      window.parent.postMessage({ source: 'dim-bridge', event: 'ready' }, '*');
    }
    document.getElementById('status').textContent = 'Ponte ativa — conectada ao Hub';
  }

  google.script.run
    .withSuccessHandler(function (json) {
      notifyReady();
      try {
        var res = JSON.parse(json);
        if (window.parent && window.parent !== window) {
          window.parent.postMessage({ source: 'dim-bridge', event: 'session', data: res.data }, '*');
        }
      } catch (e) { /* ignore */ }
    })
    .withFailureHandler(notifyReady)
    .dimApiCall('getSessionInfo', '{}');
})();
</script>
</body>
</html>
