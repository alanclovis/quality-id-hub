<!DOCTYPE html>
<html>
<head>
  <base target="_top">
  <meta charset="UTF-8">
  <style>body{font-family:sans-serif;font-size:12px;color:#666;margin:8px}</style>
</head>
<body>
<p id="status">Ponte Dimensionamento — aguardando Hub…</p>
<script>
(function () {
  function isAllowedOrigin(origin) {
    if (!origin || origin === 'null') return true;
    if (origin.indexOf('https://alanclovis.github.io') === 0) return true;
    if (origin.indexOf('.github.io') > 0) return true;
    if (origin.indexOf('http://localhost') === 0) return true;
    if (origin.indexOf('http://127.0.0.1') === 0) return true;
    return false;
  }

  function postToHub(payload) {
    var sent = false;
    try {
      if (window.opener && !window.opener.closed) {
        window.opener.postMessage(payload, '*');
        sent = true;
      }
    } catch (e) { /* ignore */ }
    try {
      if (window.parent && window.parent !== window) {
        window.parent.postMessage(payload, '*');
        sent = true;
      }
    } catch (e) { /* ignore */ }
    return sent;
  }

  var pending = {};

  window.addEventListener('message', function (ev) {
    if (!isAllowedOrigin(ev.origin)) return;
    var msg = ev.data;
    if (!msg || msg.source !== 'quality-id-hub' || !msg.id || !msg.action) return;

    if (msg.action === 'ping') {
      postToHub({ source: 'dim-bridge', id: msg.id, ok: true, data: { pong: true } });
      return;
    }

    google.script.run
      .withSuccessHandler(function (json) {
        try {
          var res = JSON.parse(json);
          postToHub({ source: 'dim-bridge', id: msg.id, ok: res.ok, data: res.data, error: res.error, validationRejected: res.validationRejected });
        } catch (e) {
          postToHub({ source: 'dim-bridge', id: msg.id, ok: false, error: String(e) });
        }
      })
      .withFailureHandler(function (err) {
        postToHub({ source: 'dim-bridge', id: msg.id, ok: false, error: String(err.message || err) });
      })
      .dimApiCall(msg.action, JSON.stringify(msg.payload || {}));
  });

  function notifyReady() {
    postToHub({ source: 'dim-bridge', event: 'ready' });
    document.getElementById('status').textContent = 'Ponte ativa — conectada ao Hub';
  }

  google.script.run
    .withSuccessHandler(function (json) {
      notifyReady();
      try {
        var res = JSON.parse(json);
        postToHub({ source: 'dim-bridge', event: 'session', data: res.data });
      } catch (e) { /* ignore */ }
    })
    .withFailureHandler(notifyReady)
    .dimApiCall('getSessionInfo', '{}');
})();
</script>
</body>
</html>
