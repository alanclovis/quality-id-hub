<script type="text/babel">
  /* ============================================================================
  SEÇÃO 1: CONFIGURAÇÕES, ÍCONES E UTILITÁRIOS
  ============================================================================ */
  const { useState, useEffect, useRef, useMemo, useCallback } = React;

  const getCurrentWeekNumber = () => {
    const date = new Date();
    date.setHours(0, 0, 0, 0);
    date.setDate(date.getDate() + 3 - (date.getDay() + 6) % 7);
    const week1 = new Date(date.getFullYear(), 0, 4);
    return 1 + Math.round(((date.getTime() - week1.getTime()) / 86400000 - 3 + (week1.getDay() + 6) % 7) / 7);
  };

  const loadIcons = () => {
    const lib = window.lucideReact || {};
    const requiredIcons = ["ChevronDown", "Save", "RefreshCw", "Calendar", "Settings", "FileText", "Plus", "X", "Search", "List", "Check", "Edit2", "Trash2", "Clock", "PieChart", "Eraser", "Info", "Undo2", "AlertTriangle", "Target", "HelpCircle", "Coffee"];
    const SafeIcons = {};
    requiredIcons.forEach(name => { const component = lib[name] || lib[name.replace('2', '')] || (() => null); SafeIcons[name] = component; });
    return SafeIcons;
  };
  
  const { ChevronDown, Save, RefreshCw, Calendar, Settings, FileText, Plus, X, Search, List, Check, Edit2, Trash2, Clock, PieChart, Eraser, Info, Undo2, AlertTriangle, Target, HelpCircle, Coffee } = loadIcons();

  const TASK_TYPES = [{ id: '', label: '(Limpar Slot)', color: getColor('') }, ...RAW_OPTIONS.map(opt => ({ id: opt, label: opt, color: getColor(opt) }))];
  const DETAILED_SLOTS = ["Planilha", "Deep Dive", "Docs", "Playbook", "RFC", "Slides", "Jira/Atlassian", "Drive", "Project Meet", "Databricks", "Quicksight"];

  const normalizeDetailsForComparison = (details) => {
      if (!details) return '{"action":"","project":"","otherSpec":""}';
      const clean = {
          action: details.action || "",
          project: details.project || "",
          otherSpec: details.otherSpec || ""
      };
      return JSON.stringify(clean);
  };

  const getRectCells = (anchor, end) => {
    const d0 = DAYS.indexOf(anchor.day);
    const d1 = DAYS.indexOf(end.day);
    const t0 = HOURS.indexOf(anchor.hour);
    const t1 = HOURS.indexOf(end.hour);
    if (d0 < 0 || d1 < 0 || t0 < 0 || t1 < 0) return [];
    const minD = Math.min(d0, d1);
    const maxD = Math.max(d0, d1);
    const minT = Math.min(t0, t1);
    const maxT = Math.max(t0, t1);
    const cells = [];
    for (let d = minD; d <= maxD; d++) {
      for (let t = minT; t <= maxT; t++) {
        if (DAYS[d] && HOURS[t]) cells.push({ day: DAYS[d], hour: HOURS[t] });
      }
    }
    return cells;
  };

  const isCellSelected = (day, hour, selectedCells) => {
    return selectedCells.some(c => c.day === day && c.hour === hour);
  };

  /* ============================================================================
  SEÇÃO 2: COMPONENTE PRINCIPAL (APP)
  ============================================================================ */
  function App() {
    const [activeView, setActiveView] = useState('escala');
    const [selectedWeek, setSelectedWeek] = useState(String(getCurrentWeekNumber()));
    const [scheduleData, setScheduleData] = useState(generateInitialData());
    const scheduleRef = useRef(generateInitialData()); 

    const [isSaving, setIsSaving] = useState(false);
    const [isLoading, setIsLoading] = useState(true);
    const [searchTerm, setSearchTerm] = useState("");
    const [ajustesSearch, setAjustesSearch] = useState("");
    const [lastUpdate, setLastUpdate] = useState(null);
    const [currentUser, setCurrentUser] = useState("Carregando...");
    const [slotDefinitions, setSlotDefinitions] = useState(STATIC_SLOT_DATA);
    
    // Engine de Salvamento
    const dirtyDaysQueueRef = useRef(new Set()); 
    const isProcessingRef = useRef(false);        
    const lastSaveTimeRef = useRef(0);
    
    const lastActionRef = useRef(null);
    const previousStateRef = useRef(null); 

    const [editingCell, setEditingCell] = useState(null); 
    const [modalConfig, setModalConfig] = useState(null);
    const [selectedCells, setSelectedCells] = useState([]);
    const [isWeekMenuOpen, setIsWeekMenuOpen] = useState(false);
    const [showUndoToast, setShowUndoToast] = useState(false);
    
    const undoTimerRef = useRef(null);
    const weekMenuRef = useRef(null);
    const activeWeekRef = useRef(null); 
    const selectionAnchorRef = useRef(null);
    const isSelectingRef = useRef(false);
    const selectMovedRef = useRef(false);
    const selectedCellsRef = useRef([]);
    const gridWrapRef = useRef(null);

    const { dateMap, visualMap } = useMemo(() => getDatesForWeek(parseInt(selectedWeek)), [selectedWeek]);

    useEffect(() => { if (isWeekMenuOpen && activeWeekRef.current) setTimeout(() => activeWeekRef.current.scrollIntoView({ block: "center", behavior: "auto" }), 50); }, [isWeekMenuOpen]);

    const setGlobalSavingState = (state) => {
        setIsSaving(state);
    };

    /* ============================================================================
    SEÇÃO 3: SINCRONIZAÇÃO (LOAD)
    ============================================================================ */
    const loadData = () => {
      const isUserBusy = dirtyDaysQueueRef.current.size > 0 || isProcessingRef.current || modalConfig !== null || editingCell !== null;
      
      if (isUserBusy) {
          console.log("Sincronização pausada: Usuário ativo.");
          return;
      }
      
      if (Date.now() - lastSaveTimeRef.current < 10000) return; 
      
      if (typeof google === 'undefined' || !google.script) { setIsLoading(false); setLastUpdate(new Date()); setCurrentUser("Dev Mode"); return; }

      const loadTimeoutId = setTimeout(() => {
        setIsLoading(false);
        setCurrentUser(prev => prev === "Carregando..." ? "Timeout ao carregar escala" : prev);
      }, 120000);
      
      google.script.run.withSuccessHandler(response => {
           clearTimeout(loadTimeoutId);
           if (dirtyDaysQueueRef.current.size > 0 || isProcessingRef.current || modalConfig !== null || editingCell !== null) return; 

           if (response.error) {
             console.error(response.error);
             setCurrentUser(response.userEmail || String(response.error));
             setIsLoading(false);
             return;
           }
           
           if (response.schedule) {
               const merged = generateInitialData();
               Object.keys(response.schedule).forEach(wk => {
                   if (!merged[wk]) merged[wk] = {};
                   Object.keys(response.schedule[wk]).forEach(d => {
                       const dData = response.schedule[wk][d];
                       Object.keys(dData).forEach(t => {
                           if (HOURS.includes(normalizeTime(t))) {
                               let c = dData[t];
                               if (c.details) c.details = parseDetails(c.details);
                               merged[wk][d][normalizeTime(t)] = { ...merged[wk][d][normalizeTime(t)], ...c };
                           }
                       });
                   });
               });
               
               const currentJson = JSON.stringify(scheduleRef.current);
               const newJson = JSON.stringify(merged);
               
               if (currentJson !== newJson && !showUndoToast) {
                   setScheduleData(merged); 
                   scheduleRef.current = merged;
                   setLastUpdate(new Date()); 
               } else if (currentJson === newJson) {
                   setLastUpdate(new Date());
               }
               setCurrentUser(response.userEmail || "Usuário não identificado");
           } else {
             setCurrentUser(response.userEmail || "Usuário não identificado");
           }
           setIsLoading(false);
        }).withFailureHandler(e => {
          clearTimeout(loadTimeoutId);
          console.error(e);
          setCurrentUser("Erro ao carregar escala");
          setIsLoading(false);
        }).getUserSchedule({ week: selectedWeek });
    };

    useEffect(() => { selectedCellsRef.current = selectedCells; }, [selectedCells]);

    useEffect(() => {
      const onUp = () => {
        if (!isSelectingRef.current && !selectMovedRef.current) return;
        isSelectingRef.current = false;
        const cells = selectedCellsRef.current;
        if (cells.length === 1 && !selectMovedRef.current) {
          const c = cells[0];
          const el = gridWrapRef.current?.querySelector(`[data-day="${c.day}"][data-hour="${c.hour}"]`);
          if (el) {
            const rect = el.getBoundingClientRect();
            setEditingCell({
              day: c.day,
              hour: c.hour,
              top: Math.min(rect.bottom + window.scrollY, window.innerHeight + window.scrollY - 300),
              left: Math.min(rect.left + window.scrollX, window.innerWidth - 250)
            });
            setSearchTerm("");
          }
        } else if (cells.length > 1) {
          const anchor = selectionAnchorRef.current || cells[0];
          const el = gridWrapRef.current?.querySelector(`[data-day="${anchor.day}"][data-hour="${anchor.hour}"]`);
          if (el) {
            const rect = el.getBoundingClientRect();
            setEditingCell({
              day: anchor.day,
              hour: anchor.hour,
              top: Math.min(rect.bottom + window.scrollY, window.innerHeight + window.scrollY - 300),
              left: Math.min(rect.left + window.scrollX, window.innerWidth - 250),
              multiCount: cells.length
            });
            setSearchTerm("");
          }
        }
        selectMovedRef.current = false;
      };
      document.addEventListener('mouseup', onUp);
      return () => document.removeEventListener('mouseup', onUp);
    }, []);

    useEffect(() => { loadData(); const interval = setInterval(loadData, 60000); return () => clearInterval(interval); }, [selectedWeek]);
    useEffect(() => { const h = e => {
      if (weekMenuRef.current && !weekMenuRef.current.contains(e.target)) setIsWeekMenuOpen(false);
      if (editingCell && !e.target.closest('.editing-popup')) setEditingCell(null);
      if (!e.target.closest('.dim-schedule-grid') && !e.target.closest('.editing-popup')) {
        if (!isSelectingRef.current) {
          setSelectedCells([]);
          selectionAnchorRef.current = null;
        }
      }
    }; document.addEventListener('mousedown', h); return () => document.removeEventListener('mousedown', h); }, [editingCell]);

    /* ============================================================================
    SEÇÃO 4: LÓGICA DE SALVAMENTO (SMART MERGE CORRIGIDO)
    ============================================================================ */
    
    // --- FUNÇÃO DE CONSOLIDAÇÃO INTELIGENTE (HERANÇA DE DETALHES) ---
    const consolidateDayBlocks = (dayData) => {
        const blocks = [];
        let currentBlock = null;
        
        // Padrão de detalhe vazio (usado para identificar perda de memória no load)
        const emptyDetailsPattern = '{"action":"","project":"","otherSpec":""}';

        HOURS.forEach(h => {
            const slot = dayData[h];
            const task = slot?.task;
            
            // Só aplica a lógica especial se for um slot detalhado (Playbook, Docs, etc.)
            if (task && DETAILED_SLOTS.includes(task)) {
                const slotDetailsStr = normalizeDetailsForComparison(slot.details);

                if (currentBlock) {
                    const isSameTask = currentBlock.task === task;
                    
                    if (isSameTask) {
                        const isIdentical = currentBlock.detailsStr === slotDetailsStr;
                        // CORREÇÃO: Se o slot atual está "sem detalhes" (padrão vazio),
                        // assumimos que ele perdeu a referência no Load e deve ser juntado ao anterior.
                        const isLostDetails = slotDetailsStr === emptyDetailsPattern;

                        if (isIdentical || isLostDetails) {
                            // Junta no bloco anterior
                            currentBlock.quantity++;
                        } else {
                            // Se tem detalhes preenchidos mas são REALMENTE DIFERENTES do anterior, separa
                            blocks.push(currentBlock);
                            currentBlock = { 
                                task, 
                                startTime: h, 
                                quantity: 1, 
                                details: parseDetails(slot.details),
                                detailsStr: slotDetailsStr
                            };
                        }
                    } else {
                        // Tarefa mudou: Separa
                        blocks.push(currentBlock);
                        currentBlock = { 
                            task, 
                            startTime: h, 
                            quantity: 1, 
                            details: parseDetails(slot.details),
                            detailsStr: slotDetailsStr
                        };
                    }
                } else {
                    // Início de um novo bloco
                    currentBlock = { 
                        task, 
                        startTime: h, 
                        quantity: 1, 
                        details: parseDetails(slot.details),
                        detailsStr: slotDetailsStr
                    };
                }
            } else {
                // Buraco/Outro tipo: Fecha bloco
                if (currentBlock) {
                    blocks.push(currentBlock);
                    currentBlock = null;
                }
            }
        });

        if (currentBlock) {
            blocks.push(currentBlock);
        }

        return blocks.map(b => {
            const { detailsStr, ...rest } = b;
            return rest;
        });
    };

    const processSaveQueue = () => {
        if (isProcessingRef.current) return;
        if (dirtyDaysQueueRef.current.size === 0) {
            setGlobalSavingState(false);
            setLastUpdate(new Date());
            lastSaveTimeRef.current = Date.now();
            return;
        }

        isProcessingRef.current = true;
        setGlobalSavingState(true);

        const dayToSave = dirtyDaysQueueRef.current.values().next().value;
        dirtyDaysQueueRef.current.delete(dayToSave);

        const currentWeekKey = selectedWeek;
        const currentWeekData = scheduleRef.current[currentWeekKey]?.[dayToSave];

        if (!currentWeekData) {
            isProcessingRef.current = false;
            processSaveQueue(); 
            return;
        }

        const batchPayload = { slots: [], details: [] };
        
        HOURS.forEach(h => {
            const slot = currentWeekData[h];
            const task = slot ? slot.task : "";
            batchPayload.slots.push({ dayDate: dateMap[dayToSave], time: h, task: task || "" });
        });

        const finalBlocks = consolidateDayBlocks(currentWeekData);
        finalBlocks.forEach(block => {
            batchPayload.details.push({
                slot: block.task, quantity: block.quantity, date: dateMap[dayToSave], startTime: block.startTime,
                action: block.details.action || "", project: block.details.project || "", other: block.details.otherSpec || ""
            });
        });

        // Limpeza de slots detalhados que não existem mais
        DETAILED_SLOTS.forEach(slotType => {
            const exists = finalBlocks.some(b => b.task === slotType);
            if (!exists) batchPayload.details.push({ slot: slotType, quantity: 0, date: dateMap[dayToSave], startTime: "00:00", analyst: currentUser });
        });

        google.script.run
            .withSuccessHandler(() => {
                console.log(`Salvo: ${dayToSave}`);
                isProcessingRef.current = false;
                processSaveQueue();
            })
            .withFailureHandler(err => {
                console.error(err);
                dirtyDaysQueueRef.current.add(dayToSave);
                isProcessingRef.current = false;
                setTimeout(processSaveQueue, 1000); 
            })
            .saveBatchData(batchPayload);
    };

    const triggerSave = (day) => {
        dirtyDaysQueueRef.current.add(day);
        setGlobalSavingState(true);
        
        if (undoTimerRef.current) clearTimeout(undoTimerRef.current);
        setTimeout(() => {
            processSaveQueue();
        }, 1000);
    };

    // --- LÓGICA LOCAL (MANTIDA IGUAL A ANTERIOR QUE FUNCIONAVA) ---
    const applySingleCell = (weekData, day, startHour, taskLabel, details, quantity) => {
      const effectiveTaskLabel = taskLabel === "(Limpar)" ? "AVLB" : taskLabel;
      const startIdx = HOURS.indexOf(startHour);

      if (taskLabel === "Break") {
        for (let i = 0; i < Math.min(2, HOURS.length - startIdx); i++) {
          if (HOURS[startIdx + i]) weekData[day][HOURS[startIdx + i]] = { task: "Break" };
        }
      } else if (taskLabel === "(Limpar)" || taskLabel === "") {
        for (let i = 0; i < quantity; i++) {
          const h = HOURS[startIdx + i];
          if (!h) break;
          delete weekData[day][h];
        }
      } else {
        let processed = 0;
        for (let i = 0; i < 16; i++) {
          const h = HOURS[startIdx + i];
          if (!h) break;
          if (processed >= quantity) break;
          if (effectiveTaskLabel === "AVLB" || effectiveTaskLabel === "") {
            weekData[day][h] = { task: "AVLB" };
          } else {
            weekData[day][h] = { task: effectiveTaskLabel, details: details };
          }
          processed++;
        }
      }
    };

    const applyTaskToCells = (cells, taskLabel, details = null, quantity = 1) => {
      if (!cells || !cells.length) return;

      setGlobalSavingState(true);
      previousStateRef.current = JSON.parse(JSON.stringify(scheduleRef.current));
      lastActionRef.current = { cells: cells.slice(), week: selectedWeek };

      const newData = JSON.parse(JSON.stringify(scheduleRef.current));
      const weekKey = selectedWeek;
      if (!newData[weekKey]) newData[weekKey] = {};
      const isMulti = cells.length > 1;
      const effectiveQty = isMulti ? 1 : quantity;
      const dirtyDays = new Set();

      cells.forEach(({ day, hour }) => {
        if (!newData[weekKey][day]) newData[weekKey][day] = {};
        applySingleCell(newData[weekKey], day, hour, taskLabel, details, effectiveQty);
        dirtyDays.add(day);
      });

      scheduleRef.current = newData;
      setScheduleData(newData);
      setModalConfig(null);
      setEditingCell(null);
      setSelectedCells([]);
      selectionAnchorRef.current = null;

      setShowUndoToast(true);
      setTimeout(() => setShowUndoToast(false), 4000);

      if (typeof google === 'undefined' || !google.script) return;
      dirtyDays.forEach(d => triggerSave(d));
    };

    const saveTask = (day, startHour, taskLabel, details = null, quantity = 1) => {
      applyTaskToCells([{ day, hour: startHour }], taskLabel, details, quantity);
    };

    const handleUndo = () => {
        if (previousStateRef.current && lastActionRef.current) {
            const restoredData = JSON.parse(JSON.stringify(previousStateRef.current));
            scheduleRef.current = restoredData;
            setScheduleData(restoredData);
            setShowUndoToast(false);
            
            const action = lastActionRef.current;
            previousStateRef.current = null;
            lastActionRef.current = null;

            if (action.cells && action.cells.length) {
              const days = new Set(action.cells.map(c => c.day));
              days.forEach(d => triggerSave(d));
            } else if (action.day) {
              triggerSave(action.day);
            }
        }
    };

    const handleCellMouseDown = (e, day, hour) => {
      e.preventDefault();
      e.stopPropagation();

      if (e.shiftKey && selectionAnchorRef.current) {
        const cells = getRectCells(selectionAnchorRef.current, { day, hour });
        setSelectedCells(cells);
        selectMovedRef.current = true;
        isSelectingRef.current = false;
        setEditingCell(null);
        return;
      }

      isSelectingRef.current = true;
      selectMovedRef.current = false;
      selectionAnchorRef.current = { day, hour };
      setSelectedCells([{ day, hour }]);
      setEditingCell(null);
    };

    const handleCellMouseEnter = (e, day, hour) => {
      if (!isSelectingRef.current || !selectionAnchorRef.current) return;
      const cells = getRectCells(selectionAnchorRef.current, { day, hour });
      if (cells.length > 1) selectMovedRef.current = true;
      setSelectedCells(cells);
    };

    /* ============================================================================
    SEÇÃO 5: VISUALIZAÇÃO E EVENTOS
    ============================================================================ */
    const handleTaskSelect = (newTaskLabel) => {
      const cells = selectedCells.length > 1
        ? selectedCells
        : (editingCell ? [{ day: editingCell.day, hour: editingCell.hour }] : []);
      if (!cells.length) return;
      setEditingCell(null);

      const isClearing = newTaskLabel === "";
      const isMulti = cells.length > 1;
      const isDetail = DETAILED_SLOTS.includes(newTaskLabel);

      if (isMulti) {
        if (isDetail) {
          setModalConfig({
            taskLabel: isClearing ? "(Limpar)" : newTaskLabel,
            cells: cells,
            multi: true,
            initialData: null,
            initialQuantity: 1
          });
        } else {
          applyTaskToCells(cells, isClearing ? "(Limpar)" : newTaskLabel, null, 1);
        }
        return;
      }

      const { day, hour } = cells[0];
      
      let currentQtd = 1;
      if (!isClearing) {
          const weekData = scheduleRef.current[selectedWeek] || {};
          const startIdx = HOURS.indexOf(hour);
          const currentDetails = parseDetails(scheduleRef.current[selectedWeek]?.[day]?.[hour]?.details);
          if (weekData[day]?.[hour]?.task === newTaskLabel) { 
            let count = 0;
            for (let i=0; i<20; i++) {
                const h = HOURS[startIdx+i];
                if (!h) break;
                const slot = weekData[day][h];
                const slotDetailsStr = normalizeDetailsForComparison(slot?.details);
                const currentDetailsStr = normalizeDetailsForComparison(currentDetails);
                const emptyJson = '{"action":"","project":"","otherSpec":""}';
                const isMatch = slotDetailsStr === currentDetailsStr || slotDetailsStr === emptyJson;
                if (slot && slot.task === newTaskLabel && isMatch) count++;
                else break; 
            }
            if (count > 0) currentQtd = count;
          }
      }
      setModalConfig({ taskLabel: isClearing ? "(Limpar)" : newTaskLabel, day, hour, initialData: isClearing ? null : parseDetails(scheduleRef.current[selectedWeek]?.[day]?.[hour]?.details), initialQuantity: currentQtd });
    };

    // --- AGRUPAMENTO INTELIGENTE (VISUAL) ---
    const getGroupedRecords = (filterTask = null) => {
        const weekData = scheduleData[selectedWeek];
        if (!weekData) return [];
        let flatRecords = [];
        DAYS.forEach(day => {
          if (weekData[day]) {
              Object.entries(weekData[day]).forEach(([hour, data]) => {
              const taskName = typeof data === 'string' ? data : data.task;
              if (!taskName || taskName === "Break") return; 
              if (filterTask && taskName !== filterTask) return;
              flatRecords.push({ day, hour, hourIndex: HOURS.indexOf(hour), data: typeof data === 'string' ? { task: data } : data, taskName: taskName });
            });
          }
        });
        flatRecords.sort((a, b) => { const dayDiff = DAYS.indexOf(a.day) - DAYS.indexOf(b.day); return dayDiff !== 0 ? dayDiff : a.hourIndex - b.hourIndex; });
        if (flatRecords.length === 0) return [];
        
        const groups = [];
        let currentGroup = { ...flatRecords[0], count: 1, endHourIndex: flatRecords[0].hourIndex };
        
        for (let i = 1; i < flatRecords.length; i++) {
          const rec = flatRecords[i];
          const prev = currentGroup;
          
          const isSameDay = rec.day === prev.day;
          const isSameTask = rec.taskName === prev.taskName;
          
          const recDetailsRaw = parseDetails(rec.data.details);
          const prevDetailsRaw = parseDetails(prev.data.details);

          const recStr = normalizeDetailsForComparison(recDetailsRaw);
          const prevStr = normalizeDetailsForComparison(prevDetailsRaw);

          const emptyJson = '{"action":"","project":"","otherSpec":""}';
          const isRecEmpty = recStr === emptyJson;
          const isPrevFull = prevStr !== emptyJson;
          
          let isSameDetails = recStr === prevStr;
          
          if (isSameTask && isSameDay && isRecEmpty && isPrevFull) {
              isSameDetails = true; // Herança visual
          }
          if (isSameTask && isSameDay && !isRecEmpty && isPrevFull && isRecEmpty) {
               isSameDetails = true; // Herança visual inversa
          }

          const gap = rec.hourIndex - prev.endHourIndex;
          let isConsecutiveLogic = false;
          if (gap === 1) isConsecutiveLogic = true; 
          else if (gap > 1 && isSameDay) {
            const currentDayBreaks = Object.keys(weekData[rec.day] || {}).filter(h => weekData[rec.day][h]?.task === 'Break');
            let allBreaksInGap = true;
            for (let k = prev.endHourIndex + 1; k < rec.hourIndex; k++) { if (!currentDayBreaks.includes(HOURS[k])) { allBreaksInGap = false; break; } }
            isConsecutiveLogic = allBreaksInGap;
          }

          if (isSameDay && isSameTask && isConsecutiveLogic && isSameDetails) { 
              currentGroup.count++; 
              currentGroup.endHourIndex = rec.hourIndex; 
          } else { 
              groups.push(currentGroup); 
              currentGroup = { ...rec, count: 1, endHourIndex: rec.hourIndex }; 
          }
        }
        groups.push(currentGroup);
        return groups;
    };

    const getSummaryData = () => {
        const weekData = scheduleData[selectedWeek]; 
        if (!weekData) return [];
        const summaryMap = {};
        DAYS.forEach(day => { if (weekData[day]) Object.values(weekData[day]).forEach(data => { const taskName = typeof data === 'string' ? data : data.task; if (taskName && taskName !== 'Break') { if (!summaryMap[taskName]) summaryMap[taskName] = 0; summaryMap[taskName]++; } }); });
        return Object.entries(summaryMap).map(([slot, count]) => ({ slot, count, hours: count * 0.5 })).sort((a, b) => b.count - a.count);
    };

    const filteredOptions = TASK_TYPES.filter(opt => opt.label.toLowerCase().includes(searchTerm.toLowerCase()));

    const rawAdjustmentsRecords = getGroupedRecords(null).filter(r => DETAILED_SLOTS.includes(r.taskName));
    
    const filteredAdjustmentRecords = rawAdjustmentsRecords.filter(r => 
        r.taskName.toLowerCase().includes(ajustesSearch.toLowerCase()) || 
        r.day.toLowerCase().includes(ajustesSearch.toLowerCase())
    );

    /* ============================================================================
    SEÇÃO 6: LAYOUT
    ============================================================================ */
    if (isLoading) {
        return (
            <div className="flex h-screen items-center justify-center bg-[#F5F5F7] flex-col" style={{ fontFamily: 'Arial, sans-serif' }}>
                <div className="animate-spin rounded-full h-12 w-12 border-b-2 border-[#820AD1] mb-4"></div>
                <p className="text-[#111827] font-medium">Carregando sua escala...</p>

  /* ============================================================================
  SEÇÃO 7: SUB-COMPONENTES
  ============================================================================ */
  function TaskConfigModal({ taskLabel, onClose, onSave, initialData, hourContext, initialQuantity, dayContext, currentSchedule, weekKey, multiCount }) {
    const isMulti = multiCount > 1;
    const isPlanilha = taskLabel === "Planilha";
    const isCleaning = taskLabel === "(Limpar)";
    const isBreak = taskLabel === "Break"; 
    
    let actionOptions = [];
    let projectOptions = [];
    let hasProjectField = true;
    let requiresDetails = false;

    if (taskLabel === "Planilha") {
       actionOptions = PLANILHA_ACTIONS; projectOptions = PLANILHA_PROJECTS; requiresDetails = true;
    } else if (taskLabel === "Deep Dive") {
       actionOptions = DEEPDIVE_ACTIONS; projectOptions = DEEPDIVE_PROJECTS; requiresDetails = true;
    } else if (taskLabel === "Docs") {
       actionOptions = DOCS_ACTIONS; projectOptions = DOCS_PROJECTS; requiresDetails = true;
    } else if (taskLabel === "Playbook") {
       actionOptions = PLAYBOOK_ACTIONS; projectOptions = PLAYBOOK_PROJECTS; requiresDetails = true;
    } else if (taskLabel === "RFC") {
       actionOptions = RFC_ACTIONS; projectOptions = RFC_PROJECTS; requiresDetails = true;
    } else if (taskLabel === "Slides") {
       actionOptions = SLIDES_ACTIONS; projectOptions = SLIDES_PROJECTS; requiresDetails = true;
    } else if (taskLabel === "Jira/Atlassian") {
       actionOptions = JIRA_ACTIONS; hasProjectField = false; requiresDetails = true;
    } else if (taskLabel === "Drive") {
       actionOptions = DRIVE_ACTIONS; hasProjectField = false; requiresDetails = true;
    } else if (taskLabel === "Project Meet") {
       actionOptions = PROJECTMEET_ACTIONS; projectOptions = PROJECTMEET_PROJECTS; requiresDetails = true;
    } else if (taskLabel === "Databricks") {
       actionOptions = DATABRICKS_ACTIONS; projectOptions = DATABRICKS_PROJECTS; requiresDetails = true;
    } else if (taskLabel === "Quicksight") {
       actionOptions = QUICKSIGHT_ACTIONS; projectOptions = QUICKSIGHT_PROJECTS; requiresDetails = true;
    }

    const [action, setAction] = useState(initialData?.action || "");
    const [project, setProject] = useState(initialData?.project || "");
    const [otherSpec, setOtherSpec] = useState(initialData?.otherSpec || "");
    const [quantity, setQuantity] = useState(isBreak ? 2 : (initialQuantity || 1)); 
    const [confirmOvertime, setConfirmOvertime] = useState(false);
    const quantityNum = parseInt(quantity) || 0;

    const calculateProjectedTotal = () => {
        const dayData = currentSchedule[weekKey]?.[dayContext] || {};
        const currentTotal = Object.values(dayData).filter(v => v.task).length;
        let slotsNeeded = quantityNum;
        let overwrittenWorkCount = 0;
        const startIdx = HOURS.indexOf(hourContext);
        for (let i = 0; i < HOURS.length - startIdx; i++) {
            if (slotsNeeded <= 0) break;
            const h = HOURS[startIdx + i];
            const existingTask = dayData[h]?.task;
            if (existingTask === "Break") continue; 
            if (existingTask) overwrittenWorkCount++;
            slotsNeeded--;
        }
        return currentTotal - overwrittenWorkCount + quantityNum;
    };

    const projectedTotal = calculateProjectedTotal();
    const isOvertime = projectedTotal > 18;

    const handleSave = () => {
      if (!quantity || quantityNum <= 0) { alert("Por favor, insira uma quantidade válida de slots (maior que 0)."); return; }
      
      if (requiresDetails) { 
        if (!action) { alert("Selecione a Ação Realizada."); return; }
        if (hasProjectField && !project) { alert("Selecione o Projeto."); return; }
      }

      if (isOvertime && !confirmOvertime && !isCleaning && !isMulti) { setConfirmOvertime(true); return; }
      const details = requiresDetails ? { action, project, otherSpec } : null;
      onSave(details, isMulti ? 1 : quantityNum);
    };

    const isWarning = isCleaning; 
    
    // Condição para mostrar campo Outros (inclui MMP/NMP)
    const showOtherSpec = action === "Outro" || 
                          project === "Outro" || 
                          project === "MMP (Projeto não mapeado)" ||
                          project === "NMP (Projeto não mapeado)";

    return (
      <div className="fixed inset-0 z-[9999] flex items-center justify-center bg-black/50 backdrop-blur-sm p-4 animate-in fade-in duration-200" style={{ fontFamily: 'Arial, sans-serif' }}>
        <div className="bg-white rounded-xl shadow-2xl w-full max-w-lg border-2 border-[#D1D5DB] overflow-hidden flex flex-col max-h-[90vh]">
          <div className={`${isWarning ? 'bg-red-600' : (isBreak ? 'bg-yellow-500' : 'bg-[#820AD1]')} px-6 py-4 flex justify-between items-center shrink-0`}>
            <div>
                <h3 className="text-white font-bold text-lg flex items-center gap-2">
                    {isCleaning ? <Trash2 size={20}/> : (isBreak ? <Coffee size={20}/> : <Edit2 size={20}/>)}
                    {taskLabel}
                </h3>
                <p className="text-white/80 text-xs mt-1 font-mono">{isMulti ? `${multiCount} slots selecionados` : `Início: ${hourContext} • ${dayContext.charAt(0).toUpperCase() + dayContext.slice(1)}`}</p>
            </div>
            <button onClick={onClose} className="text-white/70 hover:text-white transition-colors bg-white/10 p-2 rounded-full hover:bg-white/20" title="Fechar"><X size={24} /></button>
          </div>
          <div className="p-6 space-y-6 overflow-y-auto">
            {isBreak && (
                <div className="bg-yellow-50 border-l-4 border-yellow-400 p-4 mb-2 rounded-r-md">
                    <div className="flex">
                        <div className="flex-shrink-0">
                            <AlertTriangle className="h-5 w-5 text-yellow-500" />
                        </div>
                        <div className="ml-3">
                            <p className="text-sm font-bold text-yellow-800">
                                Lembre-se de alterar os slots de Break no horário antigo.
                            </p>
                        </div>
                    </div>
                </div>
            )}
            
            {!isMulti && (
            <div className={`${isWarning ? 'bg-red-50 border-red-200' : 'bg-purple-50 border-purple-200'} p-5 rounded-lg border-2 flex flex-col justify-between`}>
               <div className="flex items-center justify-between w-full mb-2">
                 <div><label className={`text-sm font-bold ${isWarning ? 'text-red-800' : 'text-[#820AD1]'} block`}>{isCleaning ? 'Limpar quantos slots?' : 'Duração da atividade'}</label><p className={`text-xs mt-1 ${isWarning ? 'text-red-600' : 'text-[#9B4DDB]'}`}>Cada slot tem 30 minutos</p></div>
                 <div className="flex items-center bg-white rounded-lg border-2 border-[#D1D5DB] shadow-sm">
                   <button disabled={isBreak} onClick={() => setQuantity(Math.max(1, quantityNum-1))} className={`px-3 py-2 text-[#6B7280] hover:bg-[#F9FAFB] border-r-2 border-[#D1D5DB] hover:text-[#111827] font-bold ${isBreak ? 'opacity-50 cursor-not-allowed' : ''}`}>-</button>
                   <input disabled={isBreak} type="number" min="1" max="20" value={quantity} onChange={(e) => { const val = e.target.value; setQuantity(val === '' ? '' : parseInt(val)); }} className={`w-12 text-center py-2 text-[#111827] font-bold focus:outline-none appearance-none m-0 ${isBreak ? 'bg-gray-100' : ''}`}/>
                   <button disabled={isBreak} onClick={() => setQuantity(quantityNum+1)} className={`px-3 py-2 text-[#6B7280] hover:bg-[#F9FAFB] border-l-2 border-[#D1D5DB] hover:text-[#111827] font-bold ${isBreak ? 'opacity-50 cursor-not-allowed' : ''}`}>+</button>
                 </div>
               </div>
               {quantityNum < initialQuantity && !isCleaning && !isBreak && (<div className="text-[10px] text-[#820AD1] bg-purple-100 px-2 py-1 rounded flex items-center"><Undo2 size={10} className="mr-1"/>Os slots excedentes ({initialQuantity - quantityNum}) virarão AVLB.</div>)}
            </div>
            )}
            
            {requiresDetails && (
              <div className="space-y-4 pt-2 animate-in slide-in-from-bottom-2 duration-300">
                <div className="space-y-1.5"><label className="text-sm font-bold text-[#374151] block">Ação Realizada <span className="text-red-500">*</span></label><div className="relative"><select value={action} onChange={(e) => setAction(e.target.value)} className="w-full p-3 bg-white border-2 border-[#D1D5DB] text-[#111827] text-sm rounded-lg focus:ring-2 focus:ring-[#820AD1] focus:border-[#820AD1] block appearance-none shadow-sm transition-shadow"><option value="" disabled>Selecione...</option>{actionOptions.map(opt => <option key={opt} value={opt}>{opt}</option>)}</select><ChevronDown className="absolute right-3 top-3.5 w-4 h-4 text-[#9CA3AF] pointer-events-none" /></div></div>
               
                {hasProjectField && (
                  <div className="space-y-1.5"><label className="text-sm font-bold text-[#374151] block">Qual o projeto? <span className="text-red-500">*</span></label><div className="relative"><select value={project} onChange={(e) => setProject(e.target.value)} className="w-full p-3 bg-white border-2 border-[#D1D5DB] text-[#111827] text-sm rounded-lg focus:ring-2 focus:ring-[#820AD1] focus:border-[#820AD1] block appearance-none shadow-sm transition-shadow"><option value="" disabled>Selecione...</option>{projectOptions.map(opt => <option key={opt} value={opt}>{opt}</option>)}</select><ChevronDown className="absolute right-3 top-3.5 w-4 h-4 text-[#9CA3AF] pointer-events-none" /></div></div>
                )}

                {showOtherSpec && (<div className="space-y-1.5 animate-in fade-in slide-in-from-top-2"><label className="text-sm font-bold text-[#374151] block">Se "Outro", especificar <span className="text-red-500">*</span></label><textarea value={otherSpec} onChange={(e) => setOtherSpec(e.target.value)} placeholder="Detalhes adicionais..." className="w-full p-3 bg-white border-2 border-[#D1D5DB] rounded-lg text-sm focus:ring-2 focus:ring-[#820AD1] focus:border-[#820AD1] min-h-[80px] shadow-sm resize-none"/></div>)}
              </div>
            )}

            {confirmOvertime && (<div className="bg-yellow-50 border-l-4 border-yellow-400 p-4 animate-in fade-in slide-in-from-bottom-2"><div className="flex"><div className="flex-shrink-0"><AlertTriangle className="h-5 w-5 text-yellow-400" aria-hidden="true" /></div><div className="ml-3"><p className="text-sm text-yellow-700 font-bold">Atenção: Limite de 9 horas excedido.</p><p className="text-xs text-yellow-600 mt-1">Você está prestes a agendar mais de 18 slots (9h) para este dia. Isso configura hora extra.</p><p className="text-xs font-bold text-yellow-800 mt-2">Deseja confirmar mesmo assim?</p></div></div></div>)}
          </div>
          <div className="bg-[#F9FAFB] px-6 py-4 flex justify-end space-x-3 border-t-2 border-[#D1D5DB] shrink-0">
            <button onClick={onClose} className="px-5 py-2.5 text-sm font-bold text-[#374151] bg-white border-2 border-[#D1D5DB] rounded-lg hover:bg-[#F3F4F6] transition-colors shadow-sm">Cancelar</button>
            <button onClick={handleSave} className={`px-5 py-2.5 text-sm font-bold text-white rounded-lg flex items-center shadow-md transition-transform active:scale-95 ${confirmOvertime ? 'bg-yellow-500 hover:bg-yellow-600 border-yellow-600' : (isWarning ? 'bg-red-600 hover:bg-red-700 border border-red-800' : (isBreak ? 'bg-yellow-500 hover:bg-yellow-600 border-yellow-600' : 'bg-[#820AD1] hover:bg-[#6b08ac] border-transparent'))}`}>{isCleaning ? <Trash2 size={16} className="mr-2" /> : <Check size={16} className="mr-2" />}{confirmOvertime ? 'Confirmar Extra' : (isCleaning ? 'Confirmar Limpeza' : (isBreak ? 'Confirmar Break' : 'Salvar Alterações'))}</button>
          </div>
        </div>
      </div>
    );
  }
</script>
