  function getCurrentWeekNumber() {
    const date = new Date();
    const t = new Date(Date.UTC(date.getFullYear(), date.getMonth(), date.getDate()));
    t.setUTCDate(t.getUTCDate() + 4 - (t.getUTCDay() || 7));
    const ys = new Date(Date.UTC(t.getUTCFullYear(), 0, 1));
    return Math.ceil((((t - ys) / 86400000) + 1) / 7);
  }

  function normalizeTime(timeStr) {
      if (!timeStr) return null;
      let clean = timeStr.toString().trim().split(':').slice(0, 2).join(':');
      if (clean.length === 4) clean = '0' + clean; 
      return clean;
  }

  function getDatesForWeek(weekNumber) {
    const simpleYear = 2026; 
    
    // Calcula a data baseada na semana escolhida
    const d = new Date(simpleYear, 0, 1 + (weekNumber - 1) * 7);
    const day = d.getDay();
    const diff = d.getDate() - day + (day === 0 ? -6 : 1); 
    const monday = new Date(d.setDate(diff));
    
    const dateMap = {}; 
    const visualMap = {}; 
    for (let i = 0; i < 5; i++) {
      const current = new Date(monday);
      current.setDate(monday.getDate() + i);
      
      const dayName = DAYS[i]; 
      const yyyy = current.getFullYear();
      const mm = String(current.getMonth() + 1).padStart(2, '0');
      const dd = String(current.getDate()).padStart(2, '0');
      
      dateMap[dayName] = `${yyyy}-${mm}-${dd}`;
      visualMap[dayName] = `${dd}/${mm}`;
    }
    return { dateMap, visualMap };
  }

  function generateInitialData() {

  }
